{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2 class="fw-bold mb-0">Campaigns</h2>
</div>

<div class="card card-soft p-3 mb-4">
  <h5 class="mb-3">Create campaign</h5>
  <form method="post" class="row g-2">
    <div class="col-md-4"><input name="name" class="form-control" placeholder="Campaign name" required></div>
    <div class="col-md-3">
      <select name="segment" class="form-select">
        <option value="all">All opted-in</option>
        <option value="hot">Hot leads</option>
        <option value="investor">Investors</option>
        <option value="nri">NRI</option>
      </select>
    </div>
    <div class="col-md-5"><input name="template_text" class="form-control" placeholder="Use {name} and {city} variables" required></div>
    <div class="col-md-12"><button class="btn btn-primary">Create campaign</button></div>
  </form>
</div>

<div class="row g-3">
{% for c in campaigns %}
  <div class="col-lg-6">
    <div class="card card-soft p-3">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <div class="fw-semibold">{{ c.name }}</div>
          <div class="small text-muted">Segment: {{ c.segment }} · Status: {{ c.status }}</div>
        </div>
        <a class="btn btn-sm btn-outline-success" href="{{ url_for('launch_campaign', campaign_id=c.id) }}">Launch</a>
      </div>
      <div class="mt-3 p-3 bg-white rounded-4">{{ c.template_text }}</div>
    </div>
  </div>
{% endfor %}
</div>
{% endblock %}
